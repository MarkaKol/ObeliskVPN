<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obelisk VPN Popup</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="preloader">
        <div class="preloader__in"></div>
    </div>
    <div class="preloader__icon"></div>
    <div class="final-icon"></div>

    <header id="header">
        <div class="vpn-name"></div>
        <div class="lang-icon" id="lang-toggle">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <path d="M11,2 C7,12 7,12 11,22"/>
                <path d="M13,2 C17,12 17,12 13,22"/>
                <path d="M2,9 C12,8 12,8 22,9"/>
                <path d="M2,15 C12,17 12,17 22,15"/>
            </svg>
        </div>
    </header>

    <main id="main-content">
        <div class="fixed-layout">
            <h1 data-en="Connect" data-ru="Подключиться" data-es="Conectar" data-zh="连接" data-hi="कनेक्ट करें" data-ar="اتصال" data-pt="Conectar" data-fr="Connecter" data-de="Verbinden" data-ja="接続" data-ko="연결" data-it="Connetti" data-tr="Bağlan" data-vi="Kết nối">Connect</h1>
            
            <div class="timer">
                <span id="timer-display">00 : 00 : 00</span>
            </div>
            
            <button class="connect-button">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2V12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M18.36 6.64001C19.6191 7.89991 20.4775 9.5024 20.8223 11.2405C21.1671 12.9787 20.9831 14.7792 20.2939 16.4111C19.6047 18.043 18.4418 19.4316 16.9519 20.4018C15.462 21.372 13.7121 21.8794 11.923 21.8601C10.1339 21.8409 8.3845 21.296 6.89707 20.2941C5.40964 19.2922 4.25141 17.8795 3.56784 16.2341C2.88427 14.5886 2.7058 12.7844 3.05513 11.0494C3.40445 9.31441 4.26557 7.72714 5.53 6.48001" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            
            <div class="info-panel" id="info-panel">
                <p class="status-field info-field">
                    <span class="info-label" data-en="Status:" data-ru="Статус:" data-es="Estado:" data-zh="状态:" data-hi="स्थिति:" data-ar="الحالة:" data-pt="Status:" data-fr="Statut:" data-de="Status:" data-ja="ステータス:" data-ko="상태:" data-it="Stato:" data-tr="Durum:" data-vi="Trạng thái:">Status:</span> 
                    <span class="info-value" id="connection-status">Disconnected</span>
                </p>
                <p class="additional-field info-field">
                    <span class="info-label" data-en="Protocol:" data-ru="Протокол:" data-es="Protocolo:" data-zh="协议:" data-hi="प्रोटोकॉल:" data-ar="البروتوكول:" data-pt="Protocolo:" data-fr="Protocole:" data-de="Protokoll:" data-ja="プロトコル:" data-ko="프로토콜:" data-it="Protocollo:" data-tr="Protokol:" data-vi="Giao thức:">Protocol:</span> 
                    <span class="info-value" id="protocol">Xray</span>
                </p>
            </div>

            <div class="speed-container" id="speed-container">
                <div class="speed-item">
                    <svg class="speed-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M12 17V7M12 17L8 13M12 17L16 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <div class="speed-info">
                        <span class="speed-value" id="download-speed">0.0</span>
                        <span class="speed-label">Download</span>
                    </div>
                </div>
                <div class="speed-item">
                    <svg class="speed-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M12 7V17M12 7L8 11M12 7L16 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <div class="speed-info">
                        <span class="speed-value" id="upload-speed">0.0</span>
                        <span class="speed-label">Upload</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="language-screen" id="language-screen">
        <div class="language-list" id="language-list"></div>
    </div>

    <script src="background.js"></script>
    <script src="popup.js"></script>
</body>
</html>
