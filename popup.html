<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obelisk VPN Popup</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="preloader">
        <div class="preloader__in"></div>
    </div>
    <div class="preloader__icon">
        <svg viewBox="0 0 100 100">
            <rect class="step1" x="30" y="85" width="40" height="5" rx="1" stroke-width="3"/>
            <rect class="step2" x="35" y="80" width="30" height="5" rx="1" stroke-width="3"/>
            <rect class="step3" x="40" y="75" width="20" height="5" rx="1" stroke-width="3"/>
            <line class="center-line" x1="50" y1="75" x2="50" y2="20" stroke-width="2"/>
            <polygon class="top-triangle" points="50,15 48,20 52,20" stroke-width="3"/>
            <path class="side-left" d="M45,75 L48,20" stroke-width="3"/>
            <path class="side-right" d="M55,75 L52,20" stroke-width="3"/>
            <circle class="circle" cx="50" cy="50" r="45" stroke-width="8"/>
        </svg>
    </div>

    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="droplet droplet-1"></div>
    <div class="droplet droplet-2"></div>
    <div class="cursor-wave" id="cursor-wave"></div>

    <header id="header">
        <div class="vpn-name">OBELISK VPN</div>
        <div class="lang-icon" id="lang-toggle">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <path d="M11,2 C7,12 7,12 11,22"/>
                <path d="M13,2 C17,12 17,12 13,22"/>
                <path d="M2,9 C12,8 12,8 22,9"/>
                <path d="M2,15 C12,17 12,17 22,15"/>
            </svg>
        </div>
    </header>

    <div class="dropdown" id="lang-menu">
        <div class="dropdown-item" data-lang="en"><span class="flag">🇬🇧</span> English</div>
        <div class="dropdown-item" data-lang="zh"><span class="flag">🇨🇳</span> 中文</div>
        <div class="dropdown-item" data-lang="hi"><span class="flag">🇮🇳</span> हिन्दी</div>
        <div class="dropdown-item" data-lang="es"><span class="flag">🇪🇸</span> Español</div>
        <div class="dropdown-item" data-lang="fr"><span class="flag">🇫🇷</span> Français</div>
        <div class="dropdown-item" data-lang="ar"><span class="flag">🇸🇦</span> العربية</div>
        <div class="dropdown-item" data-lang="ru"><span class="flag">🇷🇺</span> Русский</div>
        <div class="dropdown-item" data-lang="pt"><span class="flag">🇧🇷</span> Português</div>
        <div class="dropdown-item" data-lang="de"><span class="flag">🇩🇪</span> Deutsch</div>
        <div class="dropdown-item" data-lang="ja"><span class="flag">🇯🇵</span> 日本語</div>
        <div class="dropdown-item" data-lang="ko"><span class="flag">🇰🇷</span> 한국어</div>
        <div class="dropdown-item" data-lang="it"><span class="flag">🇮🇹</span> Italiano</div>
        <div class="dropdown-item" data-lang="tr"><span class="flag">🇹🇷</span> Türkçe</div>
        <div class="dropdown-item" data-lang="vi"><span class="flag">🇻🇳</span> Tiếng Việt</div>
    </div>

    <main>
        <div class="fixed-layout">
            <h1 data-en="Welcome" data-ru="Добро пожаловать" data-es="Bienvenido" data-zh="欢迎" data-hi="स्वागत है" data-ar="مرحبا" data-pt="Bem-vindo" data-fr="Bienvenue" data-de="Willkommen" data-ja="ようこそ" data-ko="환영합니다" data-it="Benvenuto" data-tr="Hoş Geldiniz" data-vi="Chào mừng">Welcome</h1>
            <button class="connect-button" data-en="Connect" data-ru="Подключиться" data-es="Conectar" data-zh="连接" data-hi="कनेक्ट करें" data-ar="اتصال" data-pt="Conectar" data-fr="Connecter" data-de="Verbinden" data-ja="接続" data-ko="연결" data-it="Connetti" data-tr="Bağlan" data-vi="Kết nối">Connect</button>
            <div class="info-panel" id="info-panel">
                <p class="status-field info-field">
                    <span class="info-label" data-en="Status:" data-ru="Статус:" data-es="Estado:" data-zh="状态:" data-hi="स्थिति:" data-ar="الحالة:" data-pt="Status:" data-fr="Statut:" data-de="Status:" data-ja="ステータス:" data-ko="상태:" data-it="Stato:" data-tr="Durum:" data-vi="Trạng thái:">Status:</span> 
                    <span class="info-value" id="connection-status" data-en="Ready" data-ru="Готов" data-es="Listo" data-zh="准备就绪" data-hi="तैयार" data-ar="جاهز" data-pt="Pronto" data-fr="Prêt" data-de="Bereit" data-ja="準備完了" data-ko="준비됨" data-it="Pronto" data-tr="Hazır" data-vi="Sẵn sàng">Ready</span>
                </p>
                <p class="additional-field info-field">
                    <span class="info-label" data-en="Protocol:" data-ru="Протокол:" data-es="Protocolo:" data-zh="协议:" data-hi="प्रोटोकॉल:" data-ar="البروتوكول:" data-pt="Protocolo:" data-fr="Protocole:" data-de="Protokoll:" data-ja="プロトコル:" data-ko="프로토콜:" data-it="Protocollo:" data-tr="Protokol:" data-vi="Giao thức:">Protocol:</span> 
                    <span class="info-value" id="protocol">XRay Reality</span>
                </p>
            </div>
        </div>
    </main>

    <script src="background.js"></script>
</body>
</html>
